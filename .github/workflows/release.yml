name: Release

on:
  release:
    types:
      - created
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Publish portable library output
        run: dotnet publish src/wshcmx -f netstandard2.0 -c Release -o ./publish
      - name: Create ZIP
        run: cd ./publish && zip -r ../wshcmx-cross-platform.zip ./*
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: wshcmx-cross-platform
          path: wshcmx-cross-platform.zip

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Generate TypeScript types
        run: dotnet run --project src/Typifier/Typifier.csproj --configuration Release
      - name: Compare .NET and types versions
        shell: bash
        run: |
          dotnet_version="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/wshcmx/wshcmx.csproj | head -n 1)"
          types_version="$(sed -n 's/.*"version": "\(.*\)".*/\1/p' src/Typifier/types/package.json | head -n 1)"
          if [ -z "$dotnet_version" ]; then
            echo "Version element not found in src/wshcmx/wshcmx.csproj"
            exit 1
          fi
          if [ -z "$types_version" ]; then
            echo "Version field not found in src/Typifier/types/package.json"
            exit 1
          fi
          if [ "$dotnet_version" != "$types_version" ]; then
            echo "Version mismatch: src/wshcmx/wshcmx.csproj=$dotnet_version, src/Typifier/types/package.json=$types_version"
            exit 1
          fi
          echo "Version match: $dotnet_version"
      - name: Preview npm package
        working-directory: src/Typifier/types
        run: npm pack --dry-run
      - name: Publish npm package
        working-directory: src/Typifier/types
        run: npm publish --provenance

  release:
    needs:
      - build
      - publish-npm
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: ./release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          name: Release ${{ github.event.release.tag_name }}
          body: "Automated release for ${{ github.event.release.tag_name }}."
          files: release/wshcmx-cross-platform.zip
