name: Build

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
    - name: Format check
      run: dotnet format --verify-no-changes --verbosity normal
    - name: Build
      run: dotnet build src/wshcmx
    - name: Test
      run: dotnet test --verbosity normal
