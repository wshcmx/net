name: Build

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x
    - name: Format check
      run: dotnet format --verify-no-changes --verbosity normal
    - name: Build
      run: dotnet build wshcmx.slnx --configuration Release --no-restore
    - name: Test
      run: dotnet test wshcmx.slnx --configuration Release --no-build --no-logo
